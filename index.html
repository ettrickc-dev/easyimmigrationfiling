<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immigration Help</title>

<style>
body{
font-family:Arial;
background:#f8fafc;
margin:0;
}

.container{
max-width:600px;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

h1{
text-align:center;
}

p{
text-align:center;
color:#64748b;
}

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #e2e8f0;
border-radius:6px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Immigration Help Request</h1>

<p>Tell us your situation and we will review your issue.</p>

<form action="https://formsubmit.co/ettrickc@gmail.com" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" rows="6" placeholder="Describe your immigration issue..." required></textarea>

<button type="submit">Submit Request</button>

</form>

</div>

</body>
</html>
